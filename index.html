<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Переход на страницу входа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f5f7fc 0%, #e9eef4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 2.5rem 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 1px 2px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .card:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #1a2c3e;
            letter-spacing: -0.01em;
        }

        .description {
            font-size: 1rem;
            color: #4a627a;
            margin-bottom: 2rem;
            border-bottom: 1px solid #dce5f0;
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        /* основная кнопка перехода */
        .nav-button {
            background: #1e3a5f;
            border: none;
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 8px 18px rgba(0, 20, 40, 0.15);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
            font-family: inherit;
        }

        .nav-button:hover {
            background: #0f2b44;
            transform: translateY(-3px);
            box-shadow: 0 18px 28px -8px rgba(0, 0, 0, 0.3);
        }

        .nav-button:active {
            transform: translateY(2px);
            transition: 0.05s;
            background: #0a1f33;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.2);
        }

        /* иконка для наглядности (стрелка) */
        .nav-button::after {
            content: "→";
            font-size: 1.4rem;
            font-weight: 400;
            transition: transform 0.2s;
        }

        .nav-button:hover::after {
            transform: translateX(5px);
        }

        /* альтернативная подсказка */
        .info-text {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #5e6f8d;
            background: rgba(255, 255, 255, 0.6);
            padding: 0.5rem 1rem;
            border-radius: 100px;
            display: inline-block;
        }

        /* для очень маленьких экранов */
        @media (max-width: 480px) {
            .card {
                padding: 1.8rem 1.5rem;
                border-radius: 36px;
            }
            .nav-button {
                padding: 0.8rem 1.8rem;
                font-size: 1.1rem;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 Добро пожаловать</h1>
    <div class="description">Авторизация / вход в систему</div>

    <!-- Кнопка для перехода на страницу login.php -->
    <button class="nav-button" id="goToLoginBtn">Перейти к входу</button>

    <div class="info-text">
        ⚡ Нажмите кнопку — вы перейдёте на <strong>login.php</strong>
    </div>
</div>

<script>
    (function() {
        // Получаем кнопку по ID
        const loginButton = document.getElementById('goToLoginBtn');
        
        // Добавляем обработчик клика для навигации
        if (loginButton) {
            loginButton.addEventListener('click', function(event) {
                // Можно добавить лёгкую анимацию перед переходом (не обязательно)
                // Простой и надёжный переход на страницу login.php
                window.location.href = 'login.php';
            });
        }
        
        // Дополнительно: поддержка клавиатуры (Enter/Space уже работают на кнопке)
        // а также если нужен контекстный переход по правой кнопке мыши — кнопка ведёт себя стандартно.
        // При необходимости можно открыть в новой вкладке, но по ТЗ требуется обычный переход.
        // Для улучшения UX: если нужно, чтобы пользователи не теряли прогресс — остаётся обычная навигация.
        console.log('Кнопка готова, переход на login.php');
    })();
</script>
</body>
</html>
